<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What is ICER? — Doodly-Style Explainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap');

  :root {
    --board-bg: #FFFEF9;
    --ink: #2c3e50;
    --blue: #2980b9;
    --green: #27ae60;
    --red: #e74c3c;
    --amber: #f39c12;
    --teal: #028090;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ── Whiteboard ── */
  .whiteboard {
    width: 960px;
    height: 540px;
    background: var(--board-bg);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 0 80px rgba(0,0,0,0.03);
    /* Subtle paper texture */
    background-image:
      radial-gradient(circle, rgba(0,0,0,0.01) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  /* ── Hand cursor ── */
  .drawing-hand {
    position: absolute;
    width: 70px;
    height: 70px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
  }
  .drawing-hand.visible { opacity: 1; }

  /* ── SVG draw animation ── */
  .draw-path {
    stroke-dasharray: var(--len, 1000);
    stroke-dashoffset: var(--len, 1000);
    transition: none;
  }
  .draw-path.drawn {
    stroke-dashoffset: 0;
    transition: stroke-dashoffset var(--dur, 1.5s) ease-in-out;
  }

  /* ── Sketch text (appears with write effect) ── */
  .sketch-text {
    font-family: 'Caveat', cursive;
    position: absolute;
    opacity: 0;
    clip-path: inset(0 100% 0 0);
    transition: none;
  }
  .sketch-text.written {
    opacity: 1;
    clip-path: inset(0 0% 0 0);
    transition: clip-path var(--dur, 1s) ease-in-out, opacity 0.1s;
  }

  /* ── Fade elements ── */
  .fade-el {
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .fade-el.show { opacity: 1; transform: scale(1); }

  /* ── Scene containers ── */
  .scene { position: absolute; inset: 0; opacity: 0; transition: opacity 0.6s; pointer-events: none; }
  .scene.active { opacity: 1; }

  /* ── Specific styles ── */
  .title-text {
    font-family: 'Caveat', cursive;
    font-size: 72px;
    font-weight: 700;
    fill: var(--ink);
  }

  .subtitle-text {
    font-family: 'Patrick Hand', cursive;
    font-size: 28px;
    fill: var(--teal);
  }

  /* Treatment boxes */
  .tx-rect {
    stroke-width: 2.5;
    fill: none;
    rx: 8;
  }

  /* Marker highlight effect */
  .marker-highlight {
    opacity: 0;
    transition: opacity 0.4s;
  }
  .marker-highlight.show { opacity: 0.25; }

  /* Controls */
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-play { background: #27ae60; color: white; }
  .btn-play:hover { background: #219a52; }
  .btn-play:disabled { background: #888; cursor: not-allowed; }
  .btn-reset { background: #2c3e50; color: white; }
  .btn-reset:hover { background: #1a252f; }
  .btn-upload { background: #f39c12; color: white; }
  .btn-upload:hover { background: #d68910; }
  .btn-tts { background: #028090; color: white; }
  .btn-tts:hover { background: #016d7a; }

  .audio-status { color: #ccc; font-size: 13px; font-weight: 500; }
  #voiceoverInput { display: none; }

  .progress-bar {
    width: 960px; height: 4px; background: #333;
    border-radius: 2px; margin-top: 12px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, #028090, #27ae60);
    transition: width 0.3s;
  }

  /* Subtitle bar */
  .subtitle-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 40px;
    background: rgba(44,62,80,0.85);
    color: white; font-size: 16px; font-family: 'Patrick Hand', cursive;
    text-align: center; line-height: 1.4;
    opacity: 0; transition: opacity 0.3s;
    backdrop-filter: blur(4px);
    letter-spacing: 0.3px;
  }
  .subtitle-bar.show { opacity: 1; }

  /* Branding */
  .brand {
    position: absolute; bottom: 36px; right: 20px;
    font-family: 'Patrick Hand', cursive;
    font-size: 13px; color: rgba(0,0,0,0.15);
  }
</style>
</head>
<body>

  <div class="subtitle-bar" id="subtitleBar"></div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="controls">
  <button class="btn btn-play" id="playBtn" onclick="startAnimation()">▶ Play</button>
  <button class="btn btn-reset" onclick="resetAnimation()">↺ Reset</button>
  <button class="btn btn-upload" onclick="document.getElementById('voiceoverInput').click()">🎙 Upload Voiceover</button>
  <button class="btn btn-tts" onclick="toggleTTS()">🔊 TTS: ON</button>
  <span class="audio-status" id="audioStatus">TTS enabled</span>
  <input type="file" id="voiceoverInput" accept="audio/*" onchange="handleVoiceover(event)">
</div>

<script>
let ttsEnabled = true, voiceoverAudio = null, animating = false, timeouts = [];

const narration = [
  "When we compare two treatments, we need a single number to guide our decision.",
  "The new treatment costs more — but also delivers more health, measured in QALYs.",
  "The differences: thirty thousand rupees extra cost, and one point five additional QALYs.",
  "ICER is simply the extra cost divided by the extra health gained.",
  "That gives us twenty thousand rupees per QALY.",
  "We compare this to the willingness-to-pay threshold. Below the line means cost-effective.",
  "The takeaway: if ICER is below the WTP threshold, the new treatment represents good value."
];

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  document.querySelector('.btn-tts').textContent = ttsEnabled ? '🔊 TTS: ON' : '🔇 TTS: OFF';
  document.getElementById('audioStatus').textContent = voiceoverAudio ? 'Voiceover loaded' : (ttsEnabled ? 'TTS enabled' : 'Audio off');
}

function handleVoiceover(e) {
  const f = e.target.files[0]; if (!f) return;
  voiceoverAudio = new Audio(URL.createObjectURL(f));
  document.getElementById('audioStatus').textContent = '✓ ' + f.name;
}

function draw(id) { document.getElementById(id).classList.add('drawn'); }
function write(id) {
  const el = document.getElementById(id);
  el.classList.add('written');
}
function showEl(id) { document.getElementById(id).classList.add('show'); }
function showScene(n) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById('scene' + n).classList.add('active');
}
function setSubtitle(t) { const b = document.getElementById('subtitleBar'); b.textContent = t; b.classList.add('show'); }
function hideSubtitle() { document.getElementById('subtitleBar').classList.remove('show'); }
function setProgress(p) { document.getElementById('progressFill').style.width = p + '%'; }

function moveHand(x, y, show = true) {
  const h = document.getElementById('hand');
  h.style.left = (x - 28) + 'px';
  h.style.top = (y - 8) + 'px';
  if (show) h.classList.add('visible'); else h.classList.remove('visible');
}
function hideHand() { document.getElementById('hand').classList.remove('visible'); }

function speak(text) {
  if (voiceoverAudio || !ttsEnabled) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.92; u.pitch = 1; u.lang = 'en-IN';
  speechSynthesis.speak(u);
}

function delay(ms) { return new Promise(r => { const t = setTimeout(r, ms); timeouts.push(t); }); }

function resetAnimation() {
  timeouts.forEach(clearTimeout); timeouts = [];
  animating = false; speechSynthesis.cancel();
  if (voiceoverAudio) { voiceoverAudio.pause(); voiceoverAudio.currentTime = 0; }
  document.querySelectorAll('.drawn').forEach(e => e.classList.remove('drawn'));
  document.querySelectorAll('.written').forEach(e => e.classList.remove('written'));
  document.querySelectorAll('.show').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  hideHand(); setProgress(0);
  document.getElementById('playBtn').disabled = false;
  document.getElementById('playBtn').textContent = '▶ Play';
  // Reset ticks
  document.getElementById('s4Ticks').style.opacity = '0';
}

async function startAnimation() {
  if (animating) return;
  animating = true;
  const btn = document.getElementById('playBtn');
  btn.disabled = true; btn.textContent = '⏵ Playing...';
  if (voiceoverAudio) { voiceoverAudio.currentTime = 0; voiceoverAudio.play(); }

  // ═══ Scene 1: Title ═══
  showScene(1); setProgress(5);
  setSubtitle(narration[0]); speak(narration[0]);
  moveHand(380, 260);
  await delay(400);
  write('s1Title');
  // Move hand across as text writes
  await delay(300); moveHand(550, 260);
  await delay(400); moveHand(650, 260);
  await delay(500);
  moveHand(350, 320);
  draw('s1Underline');
  await delay(200); moveHand(600, 318);
  await delay(400);
  write('s1Sub');
  await delay(300); moveHand(700, 320);
  await delay(2000);
  hideHand();
  await delay(500);

  // ═══ Scene 2: Treatments ═══
  showScene(2); setProgress(18);
  setSubtitle(narration[1]); speak(narration[1]);
  moveHand(60, 60);
  await delay(300);
  draw('s2OldBox');
  moveHand(350, 200);
  await delay(600);
  write('s2OldLabel');
  await delay(300);
  draw('s2OldDiv');
  await delay(200);
  moveHand(130, 170); write('s2OldCostL');
  await delay(200); moveHand(290, 170); write('s2OldCostV');
  await delay(300);
  moveHand(130, 230); write('s2OldQalyL');
  await delay(200); moveHand(270, 230); write('s2OldQalyV');
  await delay(400);

  moveHand(560, 60);
  await delay(200);
  draw('s2NewBox');
  moveHand(860, 200);
  await delay(600);
  write('s2NewLabel');
  await delay(300);
  draw('s2NewDiv');
  await delay(200);
  moveHand(630, 170); write('s2NewCostL');
  await delay(200); moveHand(790, 170); write('s2NewCostV');
  await delay(300);
  moveHand(630, 230); write('s2NewQalyL');
  await delay(200); moveHand(770, 230); write('s2NewQalyV');
  await delay(1500);

  // Deltas
  setProgress(30); setSubtitle(narration[2]); speak(narration[2]);
  showEl('s2CircleCost'); showEl('s2CircleCost2');
  await delay(400);
  moveHand(500, 190);
  draw('s2Arrow');
  await delay(300);
  moveHand(480, 145); write('s2DCost');
  await delay(600);
  showEl('s2CircleQaly'); showEl('s2CircleQaly2');
  moveHand(480, 245); write('s2DQaly');
  await delay(2500);
  hideHand();
  await delay(500);

  // ═══ Scene 3: Formula ═══
  showScene(3); setProgress(45);
  setSubtitle(narration[3]); speak(narration[3]);
  moveHand(140, 165);
  await delay(300);
  write('s3Label');
  await delay(200); moveHand(370, 165);
  await delay(300);
  write('s3Num');
  moveHand(550, 165);
  await delay(400);
  draw('s3FracLine');
  moveHand(370, 225);
  await delay(300);
  write('s3Den');
  moveHand(550, 225);
  await delay(2000);

  // Values
  setProgress(55); setSubtitle(narration[4]); speak(narration[4]);
  moveHand(250, 330);
  await delay(200);
  write('s3Eq2');
  await delay(200);
  moveHand(370, 320); write('s3NumV');
  await delay(200);
  draw('s3FracLine2');
  await delay(200);
  moveHand(370, 380); write('s3DenV');
  await delay(700);
  moveHand(700, 345); write('s3Result');
  await delay(400);
  draw('s3Circle');
  await delay(2500);
  hideHand();
  await delay(500);

  // ═══ Scene 4: Number line ═══
  showScene(4); setProgress(65);
  setSubtitle(narration[5]); speak(narration[5]);
  moveHand(400, 45);
  await delay(300);
  write('s4Title');
  await delay(400);
  moveHand(80, 245);
  await delay(200);
  draw('s4Axis');
  moveHand(860, 245);
  await delay(800);
  showEl('s4Tip');
  document.getElementById('s4Ticks').style.opacity = '1';
  await delay(200);
  write('s4Unit');
  await delay(600);

  // WTP
  setProgress(75);
  moveHand(480, 120);
  await delay(200);
  draw('s4WTP');
  write('s4WTPLabel');
  await delay(800);

  // Green zone
  showEl('s4Green');
  await delay(400);

  // ICER dot
  setProgress(82);
  moveHand(240, 240);
  await delay(300);
  showEl('s4Dot');
  write('s4DotLabel');
  await delay(600);

  // Verdicts
  moveHand(260, 358);
  await delay(200);
  write('s4CE');
  await delay(300);
  write('s4NCE');
  await delay(500);
  draw('s4Check');
  await delay(2500);
  hideHand();
  await delay(500);

  // ═══ Scene 5: Takeaway ═══
  showScene(5); setProgress(92);
  setSubtitle(narration[6]); speak(narration[6]);
  moveHand(80, 100);
  await delay(300);
  draw('s5Box');
  moveHand(800, 350);
  await delay(800);
  write('s5Line1');
  await delay(600);
  draw('s5Arrow');
  await delay(300);
  write('s5Line2');
  await delay(1000);
  write('s5Formula');
  await delay(3000);
  hideHand();

  setProgress(100); hideSubtitle();
  btn.textContent = '✓ Done'; animating = false;
}
</script>
</body>
</html>
